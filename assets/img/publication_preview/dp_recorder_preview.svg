<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect x="10" y="10" width="800" height="500" rx="12" fill="#f9f9fb" stroke="#d0d0d0" stroke-width="1"/>

  <!-- ===== PHASE 1 (Left Column) ===== -->
  <!-- Header -->
  <text x="200" y="52" text-anchor="middle" font-weight="bold" font-size="15" fill="#2b5a8c">PHASE 1: RECORD</text>
  <text x="200" y="70" text-anchor="middle" font-weight="bold" font-size="15" fill="#2b5a8c">(Dataset D)</text>

  <!-- Arrow: header → pre-processing -->
  <line x1="200" y1="78" x2="200" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pre-processing 1 -->
  <rect x="100" y="95" width="200" height="40" rx="6" fill="#dce8f7" stroke="#2b5a8c" stroke-width="2"/>
  <text x="200" y="120" text-anchor="middle" font-size="13" fill="#1a1a1a">Pre-processing</text>

  <!-- Arrow -->
  <line x1="200" y1="135" x2="200" y2="165" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Input label 1 -->
  <text x="200" y="182" text-anchor="middle" font-size="13" fill="#b22222">Input: q(D)</text>

  <!-- Arrow -->
  <line x1="200" y1="190" x2="200" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Mechanism Call 1 (private) -->
  <rect x="80" y="210" width="240" height="55" rx="6" fill="#fde8e8" stroke="#b22222" stroke-width="2.5"/>
  <text x="200" y="234" text-anchor="middle" font-weight="bold" font-size="13" fill="#1a1a1a">Mechanism Call</text>
  <text x="200" y="252" text-anchor="middle" font-size="12" fill="#555">(e.g., Laplace)</text>

  <!-- Arrow -->
  <line x1="200" y1="265" x2="200" y2="295" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output label 1 -->
  <text x="200" y="312" text-anchor="middle" font-size="13" fill="#2e7d32">Output: y = 5.2</text>

  <!-- Arrow -->
  <line x1="200" y1="320" x2="200" y2="350" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Post-processing 1 -->
  <rect x="100" y="350" width="200" height="40" rx="6" fill="#dce8f7" stroke="#2b5a8c" stroke-width="2"/>
  <text x="200" y="375" text-anchor="middle" font-size="13" fill="#1a1a1a">Post-processing</text>

  <!-- ===== PHASE 2 (Right Column) ===== -->
  <!-- Header -->
  <text x="620" y="52" text-anchor="middle" font-weight="bold" font-size="15" fill="#2b5a8c">PHASE 2: REPLAY</text>
  <text x="620" y="70" text-anchor="middle" font-weight="bold" font-size="15" fill="#2b5a8c">(Dataset D')</text>

  <!-- Arrow: header → pre-processing -->
  <line x1="620" y1="78" x2="620" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pre-processing 2 -->
  <rect x="520" y="95" width="200" height="40" rx="6" fill="#dce8f7" stroke="#2b5a8c" stroke-width="2"/>
  <text x="620" y="120" text-anchor="middle" font-size="13" fill="#1a1a1a">Pre-processing</text>

  <!-- Arrow -->
  <line x1="620" y1="135" x2="620" y2="165" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Input label 2 -->
  <text x="620" y="182" text-anchor="middle" font-size="13" fill="#b22222">Input: q(D')</text>

  <!-- Arrow -->
  <line x1="620" y1="190" x2="620" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Mechanism Call 2 (private) -->
  <rect x="500" y="210" width="240" height="55" rx="6" fill="#fde8e8" stroke="#b22222" stroke-width="2.5"/>
  <text x="620" y="234" text-anchor="middle" font-weight="bold" font-size="13" fill="#1a1a1a">Mechanism Call</text>
  <text x="620" y="252" text-anchor="middle" font-size="12" fill="#555">(Replay Mode)</text>

  <!-- Arrow -->
  <line x1="620" y1="265" x2="620" y2="295" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output label 2 -->
  <text x="620" y="312" text-anchor="middle" font-size="13" fill="#2e7d32">Forced Output: y = 5.2</text>

  <!-- Arrow -->
  <line x1="620" y1="320" x2="620" y2="350" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Post-processing 2 -->
  <rect x="520" y="350" width="200" height="40" rx="6" fill="#dce8f7" stroke="#2b5a8c" stroke-width="2"/>
  <text x="620" y="375" text-anchor="middle" font-size="13" fill="#1a1a1a">Post-processing</text>

  <!-- ===== HORIZONTAL CONNECTORS ===== -->

  <!-- 0. CHECK INVARIANCE (pre-processing) - dotted violet -->
  <line x1="300" y1="115" x2="520" y2="115" stroke="#7b1fa2" stroke-width="2" stroke-dasharray="4,4" marker-start="url(#arrowViolet)" marker-end="url(#arrowViolet)"/>
  <rect x="345" y="102" width="130" height="22" rx="3" fill="white"/>
  <text x="410" y="117" text-anchor="middle" font-weight="bold" font-size="11" fill="#7b1fa2">0. CHECK INVARIANCE</text>

  <!-- 1. CHECK SENSITIVITY (inputs) - solid red -->
  <line x1="270" y1="178" x2="555" y2="178" stroke="#b22222" stroke-width="2" marker-start="url(#arrowRed)" marker-end="url(#arrowRed)"/>
  <rect x="325" y="158" width="175" height="32" rx="3" fill="white"/>
  <text x="412" y="173" text-anchor="middle" font-weight="bold" font-size="11" fill="#b22222">1. CHECK SENSITIVITY</text>
  <text x="412" y="186" text-anchor="middle" font-size="11" fill="#b22222">|q(D) − q(D')| ≤ Δ?</text>

  <!-- 2. FREEZE OUTPUT (outputs) - dashed green -->
  <line x1="270" y1="308" x2="555" y2="308" stroke="#2e7d32" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowGreen)"/>
  <rect x="345" y="295" width="130" height="20" rx="3" fill="white"/>
  <text x="410" y="309" text-anchor="middle" font-weight="bold" font-size="11" fill="#2e7d32">2. FREEZE OUTPUT</text>

  <!-- 3. CHECK INVARIANCE (post-processing) - dotted violet -->
  <line x1="300" y1="370" x2="520" y2="370" stroke="#7b1fa2" stroke-width="2" stroke-dasharray="4,4" marker-start="url(#arrowViolet)" marker-end="url(#arrowViolet)"/>
  <rect x="345" y="357" width="130" height="22" rx="3" fill="white"/>
  <text x="410" y="372" text-anchor="middle" font-weight="bold" font-size="11" fill="#7b1fa2">3. CHECK INVARIANCE</text>

  <!-- ===== ARROW MARKERS ===== -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b1fa2"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b22222"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>
</svg>
